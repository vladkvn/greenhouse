# Full stack: Postgres, Mosquitto, GreenHouse API, Commander (device commands).
# Copy .env.example to .env and run: docker compose up --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: greenhouse
      POSTGRES_PASSWORD: greenhouse
      POSTGRES_DB: greenhouse
    ports:
      # Host 5433 avoids clashing with a local PostgreSQL on 5432
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenhouse -d greenhouse"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://greenhouse:greenhouse@postgres:5432/greenhouse
      API_KEY: ${API_KEY:-dev-api-key-change-me}
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy

  commander:
    build:
      context: ./apps/commander
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      GREENHOUSE_API_URL: http://api:3000
      GREENHOUSE_API_KEY: ${API_KEY:-dev-api-key-change-me}
      COMMANDER_API_KEY: ${COMMANDER_API_KEY:-dev-commander-key-change-me}
      COMMAND_TOKEN: ${COMMAND_TOKEN:-}
      DEVICE_HTTP_PORT: ${DEVICE_HTTP_PORT:-80}
      DEVICE_HTTP_TIMEOUT_MS: ${DEVICE_HTTP_TIMEOUT_MS:-10000}
    depends_on:
      - api

volumes:
  postgres_data:
