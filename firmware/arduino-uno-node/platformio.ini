; Arduino Uno test node: water level telemetry + command display.
;
; Default `uno`: USB cable only — JSON lines on Serial, see tools/serial_uno_test_bridge.py
; Optional `uno-mqtt-eth`: Ethernet shield + MQTT to Mosquitto

[platformio]
default_envs = uno

[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200
build_src_filter =
  +<*>
  -<transport_mqtt_eth.cpp>
lib_deps =
  bblanchon/ArduinoJson@^7.3.0
  marcoschwartz/LiquidCrystal_I2C@^1.1.2

[env:uno-mqtt-eth]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200
build_flags =
  -D MQTT_MAX_PACKET_SIZE=512
build_src_filter =
  +<*>
  -<transport_serial.cpp>
lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.3.0
  marcoschwartz/LiquidCrystal_I2C@^1.1.2
